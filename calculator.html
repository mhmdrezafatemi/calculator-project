<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel= 'stylesheet' href="calculator.css">
</head>
<body>
    <div  id = 'buttons' class="calculator">
        <p class="history">33</p>
        <input type="text" id="display" class="inputStyle">
        <button type="button" class="buttonStyle numbers" >7</button>
        <button type="button" class="buttonStyle numbers">8</button>
        <button type="button" class="buttonStyle numbers">9</button>
        <button type="button" class="buttonStyle operator">*</button>
        <button type="button" class="buttonStyle numbers">4</button>
        <button type="button" class="buttonStyle numbers">5</button>
        <button type="button" class="buttonStyle numbers">6</button>
        <button type="button" class="buttonStyle operator">-</button>
        <button type="button" class="buttonStyle numbers">1</button>
        <button type="button" class="buttonStyle numbers">2</button>
        <button type="button" class="buttonStyle numbers">3</button>
        <button type="button" class="buttonStyle operator">+</button>
        <button type="button" class="buttonStyle numbers">0</button>
        <button type="button" class="buttonStyle numbers">.</button>
        <button type="button" class="buttonStyle operator">=</button>
        <button type="button" class="buttonStyle operator">/</button>

    </div>

    <script src="calculator.js"></script>
</body>
</html>
